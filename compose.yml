# Edit these values before starting the stack.
x-common:
  api: &api-environment
    UNICUM_API_POSTGRES_URL: "postgres://unicum_api:CHANGE_ME@postgres:5432/unicum_api"
    UNICUM_API_UNICUM_USERNAME: "CHANGE_ME"
    UNICUM_API_UNICUM_PASSWORD: "CHANGE_ME"
    # Generate with: openssl rand -base64 32
    UNICUM_API_SALT_B64: "CHANGE_ME"
  postgres: &postgres-environment
    POSTGRES_DB: "unicum_api"
    POSTGRES_USER: "unicum_api"
    POSTGRES_PASSWORD: "CHANGE_ME"

# The values below generally do not need to be changed.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment: *api-environment
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment: *postgres-environment
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
